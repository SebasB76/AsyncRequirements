<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Sales</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.10.25/css/jquery.dataTables.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h2 class="text-2xl font-bold mb-4">202409777 - Sebastian Barco</h2>
    <h2 class="text-2xl font-bold mb-4">Coffee Sales</h2>
    <table id="example" class="table-auto w-full">
      <thead>
        <tr>
          <th class="px-4 py-2">Hour</th>
          <th class="px-4 py-2">Cash type</th>
          <th class="px-4 py-2">Money</th>
          <th class="px-4 py-2">Coffee name</th>
          <th class="px-4 py-2">Time of day</th>
          <th class="px-4 py-2">Weekday</th>
          <th class="px-4 py-2">Month</th>
          <th class="px-4 py-2">Weekday sort</th>
          <th class="px-4 py-2">Month sort</th>
          <th class="px-4 py-2">Date</th>
          <th class="px-4 py-2">Time</th>
        </tr>
      </thead>
      <tbody>
        <!-- Las filas se cargan dinámicamente desde index.js -->
      </tbody>
    </table>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.10.25/js/jquery.dataTables.min.js"></script>
